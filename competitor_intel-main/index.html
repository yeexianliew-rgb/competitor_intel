<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCredito — Market Intelligence</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --navy:#0f2342;--navy-mid:#1a3a6b;--navy-light:#2a5caa;
  --green:#00a878;--green-dark:#007a58;--green-light:#e0f7f1;
  --amber:#f59e0b;--amber-light:#fef3c7;
  --red:#e53e3e;--red-light:#fff5f5;
  --surface:#f5f7fc;--border:#dde5f4;--text:#1a2332;--muted:#5c6b84;
  --topbar-h:52px;--filterbar-h:44px;
}
body{font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--text);font-size:0.875rem}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:#b0c4de;border-radius:3px}

/* ── TOP BAR ── */
#topbar{
  position:fixed;top:0;left:0;right:0;height:var(--topbar-h);
  background:var(--navy);display:flex;align-items:center;
  gap:16px;padding:0 20px;z-index:300;
  box-shadow:0 2px 12px rgba(0,0,0,.25)
}
.brand{display:flex;align-items:baseline;gap:8px;flex-shrink:0}
.brand-eye{font-size:.6rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--green);border:1px solid var(--green);padding:2px 7px;border-radius:3px}
.brand-name{font-family:'DM Serif Display',serif;font-size:.95rem;color:#fff}
.tab-nav{display:flex;gap:2px;flex:1;justify-content:center}
.tab-btn{
  background:transparent;border:none;color:rgba(255,255,255,.55);
  font-family:'DM Sans',sans-serif;font-size:.75rem;font-weight:600;
  padding:8px 14px;border-radius:4px;cursor:pointer;
  letter-spacing:.3px;transition:all .2s;white-space:nowrap;
  border-bottom:2px solid transparent
}
.tab-btn:hover{color:#fff;background:rgba(255,255,255,.07)}
.tab-btn.active{color:#fff;border-bottom-color:var(--green);background:rgba(0,168,120,.12)}
.topbar-meta{font-size:.68rem;color:rgba(255,255,255,.45);white-space:nowrap;flex-shrink:0;display:flex;align-items:center;gap:5px}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.freshness-badge{display:inline-flex;align-items:center;gap:4px;font-size:.65rem;font-weight:500;padding:2px 7px;border-radius:20px;margin-left:6px;vertical-align:middle;letter-spacing:.2px}
.freshness-badge.fresh{background:rgba(0,168,120,.15);color:var(--green)}
.freshness-badge.stale{background:rgba(245,158,11,.15);color:var(--amber)}
.freshness-badge.overdue{background:rgba(229,62,62,.13);color:var(--red)}
.freshness-badge.unknown{background:rgba(255,255,255,.07);color:rgba(255,255,255,.4)}
.freshness-dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}
.changelog-wrap{margin:18px 0 0;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:10px}
.changelog-wrap h4{font-size:.75rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.changelog-row{display:flex;align-items:flex-start;gap:10px;padding:6px 0;border-bottom:1px solid var(--border);font-size:.78rem}
.changelog-row:last-child{border-bottom:none}
.cl-pill{font-size:.65rem;font-weight:600;padding:2px 6px;border-radius:10px;white-space:nowrap;flex-shrink:0}
.cl-pill.added{background:rgba(0,168,120,.12);color:var(--green)}
.cl-pill.modified{background:rgba(245,158,11,.12);color:var(--amber)}
.cl-pill.removed{background:rgba(229,62,62,.1);color:var(--red)}
.cl-meta{color:var(--muted);font-size:.7rem;margin-top:1px}

/* ── FILTER BAR ── */
#filterbar{
  position:fixed;top:var(--topbar-h);left:0;right:0;height:var(--filterbar-h);
  background:#fff;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:16px;padding:0 20px;z-index:200;
}
.filter-label{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);white-space:nowrap}
.chips{display:flex;gap:5px;flex-wrap:nowrap;overflow-x:auto}
.chip{
  font-size:.7rem;font-weight:600;padding:3px 10px;border-radius:12px;
  border:1px solid var(--border);background:var(--surface);color:var(--muted);
  cursor:pointer;white-space:nowrap;transition:all .15s
}
.chip:hover{border-color:var(--navy);color:var(--navy)}
.chip.active{background:var(--navy);border-color:var(--navy);color:#fff}
.chip.c-nu.active{background:#00a878;border-color:#00a878}
.chip.c-plata.active{background:var(--navy);border-color:var(--navy)}
.chip.c-kueski.active{background:#007a58;border-color:#007a58}
.chip.c-mp.active{background:var(--amber);border-color:var(--amber);color:#fff}
.chip.c-klar.active{background:var(--red);border-color:var(--red)}
.chip.c-stori.active{background:#92400e;border-color:#92400e}
.chip.c-didi.active{background:var(--red);border-color:var(--red)}
.filter-search{margin-left:auto;flex-shrink:0}
#searchInput{
  border:1px solid var(--border);border-radius:6px;padding:5px 10px;
  font-size:.78rem;font-family:'DM Sans',sans-serif;color:var(--text);
  background:var(--surface);width:180px;outline:none
}
#searchInput:focus{border-color:var(--navy);background:#fff}

/* ── PANELS ── */
.panel-container{margin-top:calc(var(--topbar-h) + var(--filterbar-h));min-height:calc(100vh - var(--topbar-h) - var(--filterbar-h))}
body.tab-digest #filterbar{display:none}
body.tab-digest .panel-container{margin-top:var(--topbar-h)}
body.tab-products #filterbar{display:none}
body.tab-products .panel-container{margin-top:var(--topbar-h)}
body.tab-marketing #filterbar{display:none}
body.tab-marketing .panel-container{margin-top:var(--topbar-h)}
body.tab-macro #filterbar{display:none}
body.tab-macro .panel-container{margin-top:var(--topbar-h)}
.tab-panel{display:none;padding:28px 32px 60px}
.tab-panel.active{display:block}

/* ── PANEL HEADER ── */
.panel-header{
  margin-bottom:24px;padding-bottom:18px;
  border-bottom:2px solid var(--border);
  display:flex;flex-direction:column;gap:4px
}
.panel-title{
  font-family:'DM Serif Display',serif;font-size:2rem;
  color:var(--navy);font-weight:400;line-height:1.15
}
.panel-sub{font-size:.82rem;color:var(--muted);line-height:1.5}

/* ── DIGEST FEED ── */
.digest-columns{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start}
@media(max-width:720px){.digest-columns{grid-template-columns:1fr}}
.digest-col-head{
  display:flex;align-items:center;justify-content:space-between;
  font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;
  color:var(--muted);margin-bottom:10px;padding-bottom:7px;
  border-bottom:2px solid var(--border)
}
.digest-col-head .col-count{font-weight:400;font-size:.62rem;color:var(--muted)}
.feed{display:flex;flex-direction:column;gap:0}
.feed-card{
  position:relative;background:#fff;border:1px solid var(--border);border-radius:8px;
  padding:13px 15px;margin-bottom:8px;
  transition:box-shadow .15s,border-color .15s
}
.feed-card:hover{box-shadow:0 3px 14px rgba(0,0,0,.07)}
.feed-card.fc-clickable{cursor:pointer}
.feed-card.fc-clickable:hover{border-color:#b0c4de;box-shadow:0 4px 16px rgba(15,35,66,.09)}
.feed-card.fc-upcoming{border-left:3px solid var(--amber)}
.feed-card.fc-promoted{border-left:3px solid var(--amber)}
/* NEW badge */
.new-badge{
  position:absolute;top:11px;right:12px;
  background:var(--green);color:#fff;
  font-size:.55rem;font-weight:800;letter-spacing:.6px;text-transform:uppercase;
  padding:2px 7px;border-radius:3px;pointer-events:none;
  transition:opacity .3s
}
.new-badge.fade{opacity:0}
.fc-meta{display:flex;align-items:center;gap:6px;margin-bottom:7px;flex-wrap:wrap}
/* Shared badge sizing — identical across NEWS and UPCOMING */
.cat-badge,.comp-badge{
  display:inline-block;font-size:.62rem;font-weight:700;
  padding:3px 8px;border-radius:4px;
  text-transform:uppercase;letter-spacing:.5px;
  border:1px solid var(--border);white-space:nowrap;line-height:1
}
.cat-badge{background:var(--surface);color:var(--muted)}
.cat-badge.upcoming{background:var(--amber-light);color:#92400e;border-color:var(--amber)}
.cat-badge.funding{background:#e8eeff;color:var(--navy-mid);border-color:#c7d4f5}
.cat-badge.regulatory{background:var(--red-light);color:var(--red);border-color:#fc8181}
.cat-badge.macro{background:var(--surface);color:var(--muted);border-color:var(--border)}
.cat-badge.competitor{background:var(--green-light);color:var(--green-dark);border-color:#b2ddd3}
.cat-badge.product{background:#e0f2fe;color:#0369a1;border-color:#7dd3fc}
.cat-badge.partnership{background:#f0fdf4;color:#15803d;border-color:#86efac}
.cat-badge.repayment_risk,.cat-badge.repaymentrisk{background:#fff7ed;color:#c2410c;border-color:#fdba74}
.cat-badge.valuation,.cat-badge.financials{background:#fdf4ff;color:#7e22ce;border-color:#d8b4fe}
.cat-badge.mx-fintech,.cat-badge.mxfintech{background:#f3e8ff;color:#6b21a8;border-color:#d8b4fe}
.cat-badge.event{background:var(--amber-light);color:#92400e;border-color:var(--amber)}
.comp-badge{background:var(--surface);color:var(--navy);border-radius:10px}
.fc-date{font-size:.65rem;color:var(--muted);margin-left:auto;white-space:nowrap}
.fc-headline{font-size:.88rem;font-weight:700;color:var(--navy);line-height:1.4;margin-bottom:4px}
.fc-headline a{color:inherit;text-decoration:none;border-bottom:1px solid transparent;transition:border-color .15s}
.fc-headline a:hover{color:var(--navy-light);border-bottom-color:var(--navy-light)}
.fc-summary{font-size:.77rem;color:#4a5568;line-height:1.5}
.fc-note{font-size:.75rem;color:#4a5568;line-height:1.5;margin-top:3px}
.fc-importance{
  font-size:.73rem;color:var(--muted);line-height:1.5;
  margin-top:6px;padding-top:6px;border-top:1px solid var(--border)
}

/* ── MARKETING FEED ── */
.mkt-subnav{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.mkt-subnav-btn{background:var(--surface);border:1px solid var(--border);color:var(--muted);font-size:.75rem;font-weight:700;padding:7px 18px;border-radius:20px;cursor:pointer;transition:all .15s;letter-spacing:.2px}
.mkt-subnav-btn:hover{border-color:var(--navy);color:var(--navy)}
.mkt-subnav-btn.active{background:var(--navy);border-color:var(--navy);color:#fff}
.mkt-section{margin-bottom:24px;padding:22px 24px;background:#fff;border:1px solid var(--border);border-radius:12px}
.mkt-section-title{font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:14px}
.mkt-funnel-summary{font-size:.84rem;line-height:1.6;color:var(--text);margin-bottom:16px;padding:10px 14px;background:var(--surface);border-radius:8px;border-left:3px solid var(--navy-light)}
.mkt-implication{margin-top:14px;padding:10px 14px;background:var(--amber-light);border-left:3px solid var(--amber);border-radius:6px;font-size:.8rem;line-height:1.5;color:#78350f}
.mkt-counter{margin-top:14px;padding:10px 14px;background:var(--green-light);border-left:3px solid var(--green);border-radius:6px;font-size:.8rem;line-height:1.5;color:#065f46;font-weight:600}
.mkt-sub-header{font-size:.72rem;font-weight:700;color:var(--navy);margin:14px 0 8px;text-transform:uppercase;letter-spacing:.5px}
.mkt-ch-table{width:100%;border-collapse:collapse;font-size:.78rem}
.mkt-ch-table thead tr{background:var(--navy);color:#fff}
.mkt-ch-table th{padding:8px 12px;text-align:left;font-weight:600;font-size:.7rem;letter-spacing:.4px}
.mkt-ch-table td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:top;line-height:1.45}
.mkt-ch-table tr:last-child td{border-bottom:none}
.ux-flow{font-size:.72rem;color:var(--muted);font-style:italic;line-height:1.45}
.ct-badge{font-size:.58rem;font-weight:800;text-transform:uppercase;letter-spacing:.4px;padding:2px 6px;border-radius:3px;display:inline-block;white-space:nowrap}
.ct-paid_social,.ct-paid{background:#dbeafe;color:#1e40af}
.ct-organic_social,.ct-organic{background:#d1fae5;color:#065f46}
.ct-search{background:#ede9fe;color:#5b21b6}
.ct-aso{background:#dcfce7;color:#166534}
.ct-affiliate{background:#fef3c7;color:#92400e}
.ct-owned{background:#e0f2fe;color:#0369a1}
.ct-comms{background:#f3f4f6;color:#374151}
.spend-high{background:#fee2e2;color:#991b1b;font-size:.62rem;font-weight:800;padding:2px 7px;border-radius:3px;text-transform:uppercase;white-space:nowrap}
.spend-medium{background:#fef3c7;color:#92400e;font-size:.62rem;font-weight:800;padding:2px 7px;border-radius:3px;text-transform:uppercase;white-space:nowrap}
.spend-low{background:#d1fae5;color:#065f46;font-size:.62rem;font-weight:800;padding:2px 7px;border-radius:3px;text-transform:uppercase;white-space:nowrap}
.mkt-channel-badge{font-size:.62rem;font-weight:700;padding:2px 8px;border-radius:3px;background:var(--surface);border:1px solid var(--border);color:var(--navy-mid)}
.mkt-date{font-size:.65rem;color:var(--muted)}
.mkt-hook-badge{font-size:.62rem;font-weight:700;padding:2px 8px;border-radius:10px;background:#e8eeff;color:var(--navy-mid);border:1px solid #c7d4f5}
.pillar-cloud{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.pillar-tag{background:var(--navy);color:#fff;font-size:.72rem;font-weight:600;padding:5px 12px;border-radius:16px;cursor:default;transition:background .15s}
.pillar-tag:hover{background:var(--navy-mid)}
.campaign-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px}
.campaign-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.campaign-name{font-weight:700;font-size:.82rem;color:var(--navy);margin-bottom:6px}
.campaign-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.campaign-copy{font-size:.78rem;font-style:italic;color:var(--text);border-left:2px solid var(--border);padding-left:10px;margin:8px 0;line-height:1.5}
.campaign-notes{font-size:.72rem;color:var(--muted)}
.prm-grid{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:14px}
.prm-card{width:280px;flex-shrink:0;background:#fff;border:1px solid var(--border);border-radius:10px;padding:16px 18px}
.prm-type-badge{font-size:.58rem;font-weight:800;text-transform:uppercase;letter-spacing:.5px;padding:2px 7px;border-radius:3px;display:inline-block;margin-bottom:8px}
.prm-t-referral{background:#dbeafe;color:#1e40af}
.prm-t-interest{background:#d1fae5;color:#065f46}
.prm-t-voucher{background:#fef3c7;color:#92400e}
.prm-t-cashback{background:#ede9fe;color:#5b21b6}
.prm-t-loyalty{background:#e0f2fe;color:#0369a1}
.prm-t-event{background:#fee2e2;color:#991b1b}
.prm-t-savings,.prm-t-savingsyield{background:#d1fae5;color:#065f46}
.prm-mechanic{font-size:.82rem;color:var(--text);font-weight:500;line-height:1.45;margin-bottom:8px}
.prm-segment{font-size:.7rem;color:var(--muted);margin-bottom:6px}
.prm-footer{display:flex;justify-content:space-between;align-items:center;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.prm-status-active{font-size:.62rem;font-weight:700;background:#d1fae5;color:#065f46;padding:2px 7px;border-radius:3px;text-transform:uppercase}
.prm-status-historic{font-size:.62rem;font-weight:700;background:#f3f4f6;color:#6b7280;padding:2px 7px;border-radius:3px;text-transform:uppercase}
.prm-period{font-size:.68rem;color:var(--muted)}

/* ── MARKETING COMPARISON GRID ── */
.mkt-comp-grid-wrap{overflow-x:auto;margin-bottom:24px}
.mkt-comp-grid{display:grid;grid-template-columns:repeat(4,minmax(240px,1fr));gap:14px;min-width:960px}
.mkt-comp-col{background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden;display:flex;flex-direction:column}
.mkt-comp-col-header{padding:13px 16px 11px;border-top:4px solid var(--navy);font-family:'DM Serif Display',serif;font-size:1rem;color:var(--navy);font-weight:400}
.mkt-funnel-summary-sm{padding:0 16px 12px;font-size:.75rem;line-height:1.55;color:var(--muted);font-style:italic;border-bottom:1px solid var(--border)}
.mkt-ch-list{flex:1}
.mkt-ch-row{padding:10px 14px;border-bottom:1px solid var(--border)}
.mkt-ch-row:last-child{border-bottom:none}
.mkt-ch-row-top{display:flex;justify-content:space-between;align-items:flex-start;gap:6px;margin-bottom:4px}
.mkt-ch-name{font-size:.78rem;font-weight:600;color:var(--navy);line-height:1.3}
.mkt-ch-row-type{margin-bottom:5px}
.mkt-ch-flow{font-size:.69rem;color:var(--muted);font-style:italic;line-height:1.4;margin-bottom:4px}
.mkt-ch-metrics{font-size:.66rem;color:var(--muted);line-height:1.3}
.mkt-implication-sm{padding:10px 14px;background:var(--amber-light);border-top:2px solid var(--amber);font-size:.74rem;line-height:1.45;color:#78350f;margin-top:auto}
.mkt-counter-sm{padding:10px 14px;background:var(--green-light);border-top:2px solid #b2ddd3;font-size:.74rem;line-height:1.45;color:#065f46;font-weight:600;margin-top:auto}
.mkt-campaign-list{flex:1}
.mkt-campaign-row{padding:10px 14px;border-bottom:1px solid var(--border)}
.mkt-campaign-row:last-child{border-bottom:none}
.mkt-campaign-row-name{font-size:.78rem;font-weight:700;color:var(--navy);margin-bottom:5px;display:flex;flex-wrap:wrap;align-items:center;gap:6px}
.mkt-pillars-wrap{padding:10px 14px 8px;border-bottom:1px solid var(--border)}
.mkt-prm-list{flex:1}
.mkt-prm-row{padding:10px 14px;border-bottom:1px solid var(--border)}
.mkt-prm-row:last-child{border-bottom:none}
.mkt-prm-row-top{display:flex;justify-content:space-between;align-items:center;gap:6px;margin-bottom:6px;flex-wrap:wrap}
.prm-mechanic-sm{font-size:.78rem;color:var(--text);line-height:1.4;margin-bottom:4px}

/* ── EXPANDABLE ROW STATES ── */
.mkt-row-clickable{cursor:pointer;transition:background .12s}
.mkt-row-clickable:hover{background:var(--surface)}
.mkt-row-active{background:#f0f6ff!important;border-left:3px solid var(--navy-light)!important}
.mkt-row-expand{font-size:1.1rem;font-weight:700;color:var(--muted);flex-shrink:0;transition:color .12s,transform .15s;display:inline-block}
.mkt-row-clickable:hover .mkt-row-expand,.mkt-row-active .mkt-row-expand{color:var(--navy);transform:rotate(90deg)}
.mkt-campaign-row{cursor:pointer;transition:background .12s}
.mkt-campaign-row:hover{background:var(--surface)}
.mkt-campaign-row.mkt-row-active{background:#f0f6ff!important;border-left:3px solid var(--navy-light)!important}
.mkt-prm-row{cursor:pointer;transition:background .12s}
.mkt-prm-row:hover{background:var(--surface)}
.mkt-prm-row.mkt-row-active{background:#f0f6ff!important;border-left:3px solid var(--navy-light)!important}

/* ── AD DETAIL PANEL ── */
.mkt-detail-panel{margin-top:20px;background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden;scroll-margin-top:calc(var(--topbar-h) + 16px)}
.mkt-detail-header{display:flex;justify-content:space-between;align-items:flex-start;padding:14px 18px 12px;border-bottom:2px solid var(--border);gap:12px;background:var(--navy)}
.mkt-detail-label{font-family:'DM Serif Display',serif;font-size:1.05rem;color:#fff;margin-bottom:2px}
.mkt-detail-sublabel{font-size:.68rem;color:rgba(255,255,255,.55)}
.mkt-detail-close{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:.85rem;width:28px;height:28px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;transition:all .15s}
.mkt-detail-close:hover{background:rgba(229,62,62,.8)}
.mkt-ad-grid{display:flex;flex-wrap:wrap;gap:14px;padding:18px 18px 22px}
.mkt-ad-card{width:300px;flex-shrink:0;border:1px solid var(--border);border-radius:10px;overflow:hidden;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.05);display:flex;flex-direction:column}
.mkt-ad-preview{height:130px;background:var(--surface);display:flex;align-items:center;justify-content:center;border-bottom:1px solid var(--border);flex-shrink:0}
.mkt-ad-preview-inner{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--muted);font-size:1.6rem;width:100%;height:100%}
.mkt-ad-body{padding:12px 14px 14px;display:flex;flex-direction:column;gap:5px;flex:1}
.mkt-ad-headline{font-size:.83rem;font-weight:700;color:var(--navy);line-height:1.4}
.mkt-ad-copy-es{font-size:.77rem;color:var(--text);line-height:1.5}
.mkt-ad-copy-en{font-size:.71rem;color:var(--muted);line-height:1.45;font-style:italic;border-left:2px solid var(--border);padding-left:8px;margin-top:2px}
.mkt-ad-footer{display:flex;justify-content:space-between;align-items:center;margin-top:auto;padding-top:8px;border-top:1px solid var(--border);flex-wrap:wrap;gap:5px}
.mkt-ad-footer-right{display:flex;align-items:center;gap:5px}
.mkt-ad-cta{font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.5px;background:var(--navy);color:#fff;padding:3px 8px;border-radius:3px;white-space:nowrap}
.mkt-ad-src-link{font-size:.65rem;font-weight:600;color:var(--navy-light);text-decoration:none;padding:2px 6px;border:1px solid var(--border);border-radius:3px;background:var(--surface)}
.mkt-ad-src-link:hover{border-color:var(--navy);color:var(--navy)}

/* ── SOFT ROW GRID (Awareness + Creatives) ── */
.mkt-row-grid-wrap{overflow-x:auto;margin-bottom:24px}
.mkt-row-grid{min-width:960px;border:1px solid var(--border);border-radius:12px;overflow:hidden;background:#fff}
.mkt-row-comp-header{display:grid;grid-template-columns:120px repeat(4,1fr);background:var(--navy)}
.mkt-row-corner{padding:10px 12px;border-right:1px solid rgba(255,255,255,.1);min-height:44px}
.mkt-row-comp-name{padding:11px 14px 10px;border-top:4px solid transparent;border-right:1px solid rgba(255,255,255,.1);font-family:'DM Serif Display',serif;font-size:.88rem;color:#fff;font-weight:400}
.mkt-row-comp-name:last-child{border-right:none}
.mkt-surface-row{display:grid;grid-template-columns:120px repeat(4,1fr);border-top:1px solid var(--border)}
.mkt-surface-label{padding:12px 10px 10px;background:var(--surface);border-right:2px solid var(--border);display:flex;flex-direction:column;gap:3px}
.mkt-surface-label-title{font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--navy)}
.mkt-surface-label-sub{font-size:.58rem;color:var(--muted);line-height:1.35}
.mkt-surface-cell{padding:8px 10px;border-right:1px solid var(--border)}
.mkt-surface-cell:last-child{border-right:none}
.mkt-surface-cell.empty{background:#fafbfd;display:flex;align-items:center;justify-content:center;min-height:60px}
.mkt-surface-empty-txt{font-size:.6rem;color:#c8d3e3;font-style:italic;text-align:center}
.mkt-cell-card{border:1px solid var(--border);border-radius:7px;padding:8px 10px;background:#fff;margin-bottom:6px}
.mkt-cell-card:last-child{margin-bottom:0}
.mkt-cell-card.mkt-row-clickable{cursor:pointer;transition:all .12s}
.mkt-cell-card.mkt-row-clickable:hover{background:var(--surface);border-color:#a8b8d0}
.mkt-cell-card.mkt-row-active{background:#f0f6ff;border-color:var(--navy-light);border-left:3px solid var(--navy-light)}
.mkt-cell-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:4px;margin-bottom:5px}
.mkt-cell-card-name{font-size:.74rem;font-weight:600;color:var(--navy);line-height:1.3;flex:1}
.mkt-cell-badges{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:4px;align-items:center}
.mkt-cell-flow{font-size:.65rem;color:var(--muted);font-style:italic;line-height:1.4}
.mkt-cell-stats{font-size:.63rem;color:var(--muted);line-height:1.3;margin-top:2px}
.mkt-cell-copy{font-size:.68rem;font-style:italic;color:var(--text);border-left:2px solid var(--border);padding-left:6px;margin-top:4px;line-height:1.4}
.mkt-pillars-cell{display:flex;flex-wrap:wrap;gap:5px;align-items:flex-start;padding:10px 12px}
.mkt-pillars-cell .pillar-tag{font-size:.63rem;padding:3px 8px}

/* ── PRODUCT FEED ── */
.prod-subnav{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.prod-tab-btn{font-size:.72rem;font-weight:700;padding:5px 12px;border-radius:4px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;transition:all .15s}
.prod-tab-btn:hover{border-color:var(--navy);color:var(--navy)}
.prod-tab-btn.active{background:var(--navy);border-color:var(--navy);color:#fff}
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:24px}
.prod-card{background:#fff;border-radius:8px;border:1px solid var(--border);border-top:4px solid var(--navy);padding:16px}
.prod-type-badge{font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;padding:2px 8px;border-radius:3px;display:inline-block;margin-bottom:8px}
.type-bnpl{background:var(--green-light);color:var(--green-dark)}
.type-loan{background:var(--amber-light);color:#92400e}
.type-card{background:#e8eeff;color:var(--navy-mid)}
.type-savings{background:var(--surface);color:var(--muted)}
.type-wallet{background:#f3e8ff;color:#6b21a8}
.prod-name{font-size:1rem;font-weight:700;color:var(--navy);margin-bottom:10px}
.prod-specs{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
.spec-row{display:flex;justify-content:space-between;font-size:.75rem;border-bottom:1px solid var(--surface);padding-bottom:4px}
.spec-label{color:var(--muted);font-weight:500}
.spec-value{color:var(--text);font-weight:600;text-align:right;max-width:55%}
.prod-promise{font-size:.75rem;font-style:italic;color:var(--navy-mid);margin-bottom:8px;padding:6px 8px;background:var(--surface);border-radius:4px}
.prod-notes{font-size:.73rem;color:#4a5568;background:var(--surface);padding:6px 10px;border-radius:4px;border-left:3px solid var(--border)}
.threat-section{background:#fff;border:1px solid var(--border);border-top:4px solid var(--red);border-radius:8px;padding:20px;margin-bottom:24px}
.threat-title{font-family:'DM Serif Display',serif;font-size:1.1rem;color:var(--red);margin-bottom:8px}
.threat-bullets{list-style:none;display:flex;flex-direction:column;gap:6px}
.threat-bullets li{font-size:.8rem;color:#4a5568;padding-left:16px;position:relative;line-height:1.5}
.threat-bullets li::before{content:"→";position:absolute;left:0;color:var(--red);font-weight:700}

/* ── SENTIMENT ── */
.sentiment-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px;margin-bottom:28px}
.sent-card{background:#fff;border-radius:8px;border:1px solid var(--border);overflow:hidden}
.sent-header{padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.sent-comp{font-size:.75rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--navy)}
.sent-score{font-family:'DM Serif Display',serif;font-size:1.3rem}
.sent-score.good{color:var(--green-dark)}
.sent-score.ok{color:#92400e}
.sent-score.bad{color:var(--red)}
.sent-body{padding:14px 16px}
.sent-section-label{font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px}
.tag-list{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.stag{font-size:.67rem;font-weight:600;padding:2px 8px;border-radius:10px}
.stag-red{background:var(--red-light);color:var(--red);border:1px solid #fc8181}
.stag-green{background:var(--green-light);color:var(--green-dark);border:1px solid #b2ddd3}
.sent-quote{background:var(--surface);border-left:3px solid var(--border);border-radius:0 4px 4px 0;padding:7px 10px;font-size:.74rem;font-style:italic;color:#4a5568;margin-bottom:6px;line-height:1.5}
.sent-observed{background:var(--surface);border-top:1px solid var(--border);font-size:.74rem;color:#4a5568;padding:8px 12px;border-radius:0 0 6px 6px;margin:10px -16px -14px;line-height:1.5}
.sent-sources{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.src-chip{font-size:.62rem;padding:1px 7px;border-radius:8px;background:var(--surface);border:1px solid var(--border);color:var(--muted)}

/* ── BUSINESS STATS ── */
.threat-summary-table{margin-bottom:24px;overflow-x:auto}
.threat-table{width:100%;border-collapse:collapse;font-size:.78rem;background:#fff;border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.threat-table thead tr{background:var(--navy);color:#fff}
.threat-table th{padding:9px 12px;text-align:left;font-size:.7rem;font-weight:600;white-space:nowrap}
.threat-table tbody tr{transition:background .1s}
.threat-table tbody tr:nth-child(even){background:var(--surface)}
.threat-table tbody tr:hover{background:#e8f4f0}
.threat-table td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
.threat-row-high td:first-child{border-left:3px solid var(--red)}
.threat-row-medium td:first-child{border-left:3px solid var(--amber)}
.threat-row-low td:first-child{border-left:3px solid var(--green)}
.t-badge{display:inline-block;font-size:.63rem;font-weight:800;padding:2px 7px;border-radius:3px;text-transform:uppercase;letter-spacing:.4px}
.t-high{background:var(--red-light);color:var(--red)}
.t-medium{background:var(--amber-light);color:#92400e}
.t-low{background:var(--green-light);color:var(--green-dark)}
.t-strong{background:var(--green-light);color:var(--green-dark)}
.t-mixed{background:var(--amber-light);color:#92400e}
.t-weak{background:var(--red-light);color:var(--red)}
.t-unknown{background:var(--surface);color:var(--muted)}
.est{font-size:.65rem;color:var(--muted);font-style:italic}

.biz-accordion{display:flex;flex-direction:column;gap:8px;margin-bottom:28px}
.biz-row{background:#fff;border-radius:8px;border:1px solid var(--border);overflow:hidden}
.biz-header{
  padding:12px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;
  transition:background .15s
}
.biz-header:hover{background:var(--surface)}
.biz-comp-name{font-weight:700;color:var(--navy);font-size:.88rem;min-width:120px}
.biz-pills{display:flex;gap:6px;flex-wrap:wrap;flex:1}
.biz-pill{font-size:.68rem;background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:2px 8px;color:var(--text)}
.biz-pill span{color:var(--muted);font-size:.62rem;display:block}
.biz-badges{display:flex;gap:5px;margin-left:auto}
.biz-detail{display:none;border-top:1px solid var(--border);padding:16px}
.biz-detail.open{display:block}
.biz-ue-table{width:100%;border-collapse:collapse;font-size:.77rem;margin-bottom:10px}
.biz-ue-table th{text-align:left;padding:6px 10px;background:var(--surface);font-size:.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.biz-ue-table td{padding:7px 10px;border-bottom:1px solid var(--surface)}
.biz-observed{font-size:.78rem;color:#4a5568;background:var(--surface);padding:8px 12px;border-radius:4px;border-left:3px solid var(--border)}

/* ── KPI CARDS (used in Macro + Product tabs) ── */
.kpi-grid{display:flex;flex-wrap:wrap;gap:12px;margin:16px 0 24px}
.kpi-card{background:var(--surface);border-radius:10px;padding:16px 18px;flex:1 1 155px;border-top:3px solid var(--navy);min-width:130px;transition:transform .2s,box-shadow .2s}
.kpi-card:hover{transform:translateY(-3px);box-shadow:0 8px 22px rgba(15,35,66,.09)}
.kpi-card.green{border-top-color:var(--green);background:var(--green-light)}
.kpi-card.amber{border-top-color:var(--amber);background:var(--amber-light)}
.kpi-card.red{border-top-color:var(--red);background:var(--red-light)}
.kpi-val{font-family:'DM Serif Display',serif;font-size:1.55rem;color:var(--navy);line-height:1.1}
.kpi-card.green .kpi-val{color:var(--green-dark)}
.kpi-card.amber .kpi-val{color:#92400e}
.kpi-card.red .kpi-val{color:var(--red)}
.kpi-lbl{font-size:.67rem;color:var(--muted);margin-top:5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.kpi-note{font-size:.72rem;color:#4a5568;line-height:1.45;margin-top:6px}

/* ── INFO BOXES ── */
.info-box{border-left:4px solid var(--navy);background:var(--surface);border-radius:0 8px 8px 0;padding:14px 18px;margin:12px 0;font-size:.85rem;line-height:1.65}
.info-box.green{border-left-color:var(--green);background:var(--green-light)}
.info-box.amber{border-left-color:var(--amber);background:var(--amber-light)}
.info-box.red{border-left-color:var(--red);background:var(--red-light)}
.info-title{font-weight:700;color:var(--navy);margin-bottom:5px;font-size:.9rem}
.info-box.green .info-title{color:var(--green-dark)}
.info-box.amber .info-title{color:#92400e}
.info-box.red .info-title{color:var(--red)}

/* ── SIGNAL TICKER ── */
.signal-ticker{display:flex;gap:10px;flex-wrap:wrap;margin:12px 0 20px}
.signal-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:.78rem;flex:1 1 160px}
.sig-label{font-weight:700;color:var(--navy);font-size:.7rem;margin-bottom:3px;text-transform:uppercase;letter-spacing:.3px}
.sig-val{font-family:'DM Serif Display',serif;font-size:1.1rem;color:var(--green-dark);line-height:1.1}
.sig-note{font-size:.68rem;color:var(--muted);margin-top:2px;line-height:1.4}

/* ── CHART ROW / WRAP ── */
.chart-row{display:flex;gap:16px;flex-wrap:wrap;margin:12px 0 20px}
.chart-wrap{background:#fff;border-radius:10px;padding:18px 18px 14px;border:1px solid var(--border);box-shadow:0 2px 10px rgba(0,0,0,.04);flex:1 1 280px}
.chart-wrap canvas{max-height:260px}
.chart-wrap:hover{box-shadow:0 6px 20px rgba(0,0,0,.08)}
.section-title-old{font-family:'DM Serif Display',serif;font-size:1.4rem;font-weight:400;color:var(--navy);margin:32px 0 6px;padding-left:18px;position:relative}
.section-title-old::before{content:'';position:absolute;left:0;top:5px;width:4px;height:calc(100% - 8px);background:var(--green);border-radius:2px}
.tab-panel p{font-size:.88rem;line-height:1.75;color:#2d3748;margin-bottom:10px}
.tab-panel ul,.tab-panel ol{margin:6px 0 10px 20px}
.tab-panel li{font-size:.87rem;line-height:1.7;color:#2d3748;margin-bottom:4px}
.tab-panel strong{color:var(--navy)}

/* ── MECE TREE ── */
.tree-node{background:#fff;border:1px solid var(--border);border-radius:8px;padding:10px 14px;text-align:center;box-shadow:0 2px 5px rgba(0,0,0,.03)}
.tree-node.node-l1{background:var(--navy);color:#fff;border-color:var(--navy);padding:12px 26px;border-radius:10px;min-width:220px}
.tree-node.node-l2{padding:11px 15px;border-radius:9px}
.tree-node.node-l3{padding:9px 12px;border-radius:7px;text-align:left}
.tree-node.node-l4{padding:9px 12px;border-radius:7px}
.tree-node.node-green{background:var(--green-light);border-color:#b2ddd3}
.tree-node.node-amber{background:var(--amber-light);border-color:#fcd34d}
.tree-node.node-blue{background:var(--surface);border-color:var(--border)}
.node-label{font-weight:700;font-size:.85rem;color:var(--navy);margin-bottom:2px}
.node-l1 .node-label{color:#fff;font-size:.88rem}
.node-val{font-family:'DM Serif Display',serif;font-size:1.2rem;color:var(--navy);line-height:1.1}
.node-l1 .node-val{color:var(--green);font-size:1.35rem}
.node-sub{font-size:.65rem;color:var(--muted);margin-top:3px;line-height:1.4}
.node-l1 .node-sub{color:rgba(255,255,255,.6)}
.node-label-sm{font-weight:700;font-size:.77rem;color:var(--navy)}
.node-val-sm{font-family:'DM Serif Display',serif;font-size:.94rem;color:var(--navy);white-space:nowrap}
.node-sub-sm{font-size:.65rem;color:var(--muted);line-height:1.4;margin-top:2px}
.node-row{display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-bottom:2px}
.tree-vline{width:2px;height:14px;background:var(--border);margin:0 auto}
.tree-line-center{width:2px;height:12px;background:var(--border);margin:0 auto}
.tab-hr{border:none;border-top:1px solid var(--border);margin:28px 0}

/* ── PLAYER CARDS (Archetype section) ── */
.player-grid{display:flex;flex-wrap:wrap;gap:16px;margin:14px 0 20px}
.player-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:18px 20px;border-top:4px solid var(--navy);box-shadow:0 2px 8px rgba(0,0,0,.04);transition:box-shadow .2s;width:300px;flex-shrink:0}
.player-card:hover{box-shadow:0 8px 22px rgba(15,35,66,.1)}

/* ── DETAIL MODAL ── */
#detail-modal-overlay{position:fixed;inset:0;background:rgba(10,22,45,.6);z-index:500;display:none;align-items:flex-start;justify-content:center;padding:48px 24px 24px;overflow-y:auto}
#detail-modal-overlay.open{display:flex}
#detail-modal{background:#fff;border-radius:14px;width:100%;max-width:880px;box-shadow:0 28px 72px rgba(0,0,0,.28);flex-shrink:0;margin:auto}
#detail-modal-header{display:flex;justify-content:space-between;align-items:flex-start;padding:18px 22px 14px;border-bottom:1px solid var(--border);gap:12px}
#detail-modal-title{font-family:'DM Serif Display',serif;font-size:1.3rem;color:var(--navy);line-height:1.2}
#detail-modal-type{font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-top:3px}
#detail-modal-close{background:var(--surface);border:1px solid var(--border);color:var(--muted);font-size:.9rem;width:30px;height:30px;border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;transition:all .15s}
#detail-modal-close:hover{background:var(--navy);color:#fff;border-color:var(--navy)}
#detail-modal-body{padding:22px 24px 28px}
.card-type{font-size:.62rem;color:var(--green-dark);font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.card-name{font-family:'DM Serif Display',serif;font-size:1.05rem;color:var(--navy);margin-bottom:3px}
.card-tagline{font-size:.76rem;color:var(--muted);margin-bottom:10px;font-weight:500}
.stat-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.stat-pill{background:var(--surface);border-radius:6px;padding:5px 9px;font-size:.71rem;color:var(--navy);font-weight:600}
.stat-pill span{display:block;font-size:.59rem;color:var(--muted);font-weight:400;margin-top:1px;text-transform:uppercase;letter-spacing:.2px}
.card-watch{font-size:.74rem;color:#92400e;font-weight:600;border-top:1px solid var(--border);padding-top:8px;margin-top:8px}
.card-limited{display:inline-block;font-size:.58rem;font-weight:800;text-transform:uppercase;letter-spacing:.5px;background:#fef3c7;color:#92400e;border:1px solid var(--amber);padding:2px 7px;border-radius:3px;margin-bottom:6px}
.sub-sub-title{font-size:.88rem;font-weight:700;color:var(--green-dark);margin:16px 0 6px}
.prod-specs-header{font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin:20px 0 10px;padding-top:16px;border-top:2px solid var(--border)}
.tbl-wrap{overflow-x:auto;margin:10px 0 20px;border-radius:8px;border:1px solid var(--border)}
.tbl-wrap table{width:100%;border-collapse:collapse;font-size:.8rem;background:#fff}
.tbl-wrap thead tr{background:var(--navy);color:#fff}
.tbl-wrap thead th{padding:9px 12px;text-align:left;font-weight:600;font-size:.72rem;white-space:nowrap}
.tbl-wrap tbody tr:nth-child(even){background:var(--surface)}
.tbl-wrap tbody tr:hover{background:#e8f4f0}
.tbl-wrap td{padding:8px 12px;border-bottom:1px solid var(--border);vertical-align:top;line-height:1.4;font-size:.79rem}
.prod-specs-section{margin-top:16px;padding-top:14px;border-top:2px dashed var(--border)}

/* ── CAL TABLE ── */
.cal-table{width:100%;border-collapse:collapse;font-size:.78rem;background:#fff;border-radius:8px;overflow:hidden;border:1px solid var(--border);margin-bottom:16px}
.cal-table thead tr{background:var(--navy);color:#fff}
.cal-table th{padding:8px 12px;font-size:.7rem;font-weight:600;text-align:left}
.cal-table td{padding:8px 12px;border-bottom:1px solid var(--border)}
.cal-table tbody tr:hover{background:var(--surface)}

/* ── VERDICT BOX ── */
.verdict-box{border-radius:8px;padding:16px 20px;margin-bottom:8px;border:1px solid}
.verdict-box.favorable{background:var(--green-light);border-color:var(--green)}
.verdict-box.neutral{background:var(--amber-light);border-color:var(--amber)}
.verdict-box.risky{background:var(--red-light);border-color:var(--red)}
.verdict-label{font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px}
.verdict-box.favorable .verdict-label{color:var(--green-dark)}
.verdict-box.neutral .verdict-label{color:#92400e}
.verdict-box.risky .verdict-label{color:var(--red)}
.verdict-text{font-size:.85rem;font-weight:600;color:var(--navy);line-height:1.55}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:48px 20px;color:var(--muted)}
.empty-state p{font-size:.85rem;margin-top:6px}

/* ── SECTION DIVIDER ── */
.section-hed{font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin:24px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border)}

/* ── SOURCE LINK ── */
a.src{font-size:.65rem;color:var(--navy-light);text-decoration:none}
a.src:hover{text-decoration:underline}

/* ── LANDING SCREEN ── */
#landing-screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 20px;background:var(--bg)}
.landing-brand{font-family:'DM Serif Display',serif;font-size:2.2rem;color:var(--navy);text-align:center;margin-bottom:4px}
.landing-brand span{color:var(--muted);font-size:1.1rem;display:block;font-family:'Inter',sans-serif;font-weight:400;margin-top:6px}
.landing-sub{font-size:.88rem;color:var(--muted);margin:14px 0 36px;text-align:center}
.market-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;max-width:400px;width:100%}
.market-card{background:#fff;border:2px solid var(--border);border-radius:14px;padding:28px 20px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:10px;font-size:.9rem;font-weight:700;color:var(--navy);transition:border-color .15s,box-shadow .15s;line-height:1.3}
.market-card:hover{border-color:var(--navy);box-shadow:0 4px 18px rgba(15,35,66,.13)}
.market-flag{font-size:2.4rem;line-height:1}
/* Visibility: default shows landing, hides dashboard */
body:not(.market-selected) #landing-screen{display:flex}
body:not(.market-selected) #topbar,body:not(.market-selected) #filterbar,body:not(.market-selected) .panel-container{display:none}
body.market-selected #landing-screen{display:none}
body.market-selected #topbar{display:flex}
/* Back button */
#backBtn{background:none;border:1px solid var(--border);color:var(--navy-light);font-size:.72rem;font-weight:600;padding:5px 11px;border-radius:6px;cursor:pointer;white-space:nowrap;margin-right:10px;flex-shrink:0}
#backBtn:hover{border-color:var(--navy);color:var(--navy)}
</style>
</head>

  if(!q) return true;
  const lq = q.toLowerCase();
  return fields.some(f => f && String(f).toLowerCase().includes(lq));
}

function matchesComp(itemComp, filterComp){
  if(filterComp === 'all') return true;
  return (itemComp||'').toLowerCase() === filterComp.toLowerCase();
}

// RENDER: DIGEST
// ═══════════════════════════════════════════
function renderDigest(){
  const q = state.search;
  const comp = state.competitor;
  const today = new Date();
  today.setHours(0,0,0,0);

  // Split upcoming events: past/today → promoted to NEWS; future → UPCOMING column
  const promoted = [];
  const futureUpcoming = [];
  MD().upcomingEvents.forEach(e => {
    const d = new Date(e.sortDate);
    if(d <= today) promoted.push(e);
    else futureUpcoming.push(e);
  });

  // NEWS column: no competitor filter — digest is an open feed
  const baseNews = MD().newsItems.filter(n =>
    matchesSearch([n.headline, n.oneLineSummary, n.competitor, n.category], q)
  );
  const promotedAsNews = promoted.filter(e =>
    matchesSearch([e.title, e.note], q)
  );

  // Combine and sort by date descending
  const allNews = [
    ...baseNews.map(n => ({...n, _type:'news', _sortDate: new Date(n.date)})),
    ...promotedAsNews.map(e => ({
      _type:'promoted', _sortDate: new Date(e.sortDate),
      id: 'ev-'+e.sortDate, date: e.date,
      category:'Event', competitor:'',
      headline: e.title,
      whatHappened: e.summary || e.note || null,
      whyItMatters: e.importance || null,
      oneLineSummary: e.note || e.summary || null,
      sourceUrl:''
    }))
  ].sort((a,b) => b._sortDate - a._sortDate);

  // UPCOMING column: future events sorted soonest first
  const upcomingFiltered = futureUpcoming
    .filter(e => !q || matchesSearch([e.title, e.note], q))
    .sort((a,b) => new Date(a.sortDate) - new Date(b.sortDate));

  const seenIds = getSeenIds();

  function newsCard(n){
    const catLc = (n.category||'').toLowerCase().replace(/\s+/g,'');
    const hasLink = !!n.sourceUrl;
    const isNew = !!n.id && !seenIds.has(n.id);
    const extraClass = (n._type==='promoted' ? ' fc-promoted' : '') + (hasLink ? ' fc-clickable' : '');
    return `
    <div class="feed-card${extraClass}" data-id="${escHtml(n.id||'')}" data-src="${escHtml(n.sourceUrl||'')}">
      ${isNew ? '<span class="new-badge">New</span>' : ''}
      <div class="fc-meta">
        <span class="cat-badge ${catLc}">${escHtml(n.category)}</span>
        ${n.competitor ? `<span class="comp-badge">${escHtml(n.competitor)}</span>` : ''}
        <span class="fc-date">${fmtDate(n.date)}</span>
      </div>
      <div class="fc-headline">${escHtml(n.headline)}</div>
      ${n.whatHappened ? `<div class="fc-summary">${escHtml(n.whatHappened)}</div>` : ''}
      ${n.whyItMatters ? `<div class="fc-summary fc-why" style="color:var(--muted);margin-top:3px">${escHtml(n.whyItMatters)}</div>` : ''}
      ${(!n.whatHappened && n.oneLineSummary) ? `<div class="fc-summary">${escHtml(n.oneLineSummary)}</div>` : ''}
    </div>`;
  }

  function upcomingCard(e){
    const impLc = (e.importance||'').toLowerCase().replace(/\s+/g,'');
    const impColor = {critical:'var(--red)',veryhigh:'#c2410c',high:'var(--amber)',medium:'var(--muted)',low:'var(--muted)'}[impLc] || 'var(--muted)';
    const body = e.summary || e.note || '';
    const detail = e.importance || '';
    return `
    <div class="feed-card fc-upcoming">
      <div class="fc-meta">
        <span class="cat-badge upcoming">Upcoming</span>
        ${detail ? `<span style="font-size:.62rem;font-weight:700;color:${impColor};padding:2px 0">${escHtml(detail)}</span>` : ''}
        <span class="fc-date">${escHtml(e.date)}</span>
      </div>
      <div class="fc-headline">${escHtml(e.title)}</div>
      ${body ? `<div class="fc-summary" style="margin-top:4px">${escHtml(body)}</div>` : ''}
    </div>`;
  }

  const newsFeed = allNews.length
    ? allNews.map(newsCard).join('')
    : `<div class="empty-state" style="padding:24px 0"><p>No news matches the current filter.</p></div>`;

  const upcomingFeed = upcomingFiltered.length
    ? upcomingFiltered.map(upcomingCard).join('')
    : `<div class="empty-state" style="padding:24px 0"><p>No upcoming events.</p></div>`;

  // Change log block (populated async by Supabase loader after render)
  const changeLogHtml = `<div id="change-log-block"></div>`;

  document.getElementById('panel-digest').innerHTML = `
    <div class="panel-header">
      <div class="panel-title">Daily Digest</div>
      <div class="panel-sub">${escHtml(MD().meta.name)} credit &amp; fintech · ${allNews.length} news · ${upcomingFiltered.length} upcoming</div>
    </div>
    ${changeLogHtml}
    <div class="digest-columns">
      <div>
        <div class="digest-col-head">News <span class="col-count">${allNews.length} items</span></div>
        <div class="feed">${newsFeed}</div>
      </div>
      <div>
        <div class="digest-col-head">Upcoming <span class="col-count">${upcomingFiltered.length} events</span></div>
        <div class="feed">${upcomingFeed}</div>
      </div>
    </div>
  `;

  // Wire up card interactions: click to open source + mark seen; hover 1s to mark seen
  document.querySelectorAll('#panel-digest .feed-card[data-id]').forEach(card => {
    const id = card.dataset.id;
    const src = card.dataset.src;
    if(!id) return;

    function dismiss(){
      markSeen(id);
      const badge = card.querySelector('.new-badge');
      if(badge){ badge.classList.add('fade'); setTimeout(() => badge.remove(), 300); }
    }

    if(src){
      card.addEventListener('click', () => {
        // Google News URLs are redirect wrappers — extract the real URL from the query string if present
        let target = src;
        try {
          const u = new URL(src);
          if(u.hostname === 'news.google.com') {
            const real = u.searchParams.get('url') || u.searchParams.get('q');
            if(real) target = real;
          }
        } catch(_){}
        window.open(target, '_blank', 'noopener,noreferrer');
        dismiss();
      });
    }

    if(!seenIds.has(id)){
      let t = null;
      card.addEventListener('mouseenter', () => { t = setTimeout(dismiss, 1000); });
      card.addEventListener('mouseleave', () => clearTimeout(t));
    }
  });
}

    if(lc.includes('google')&&!lc.includes('meta')&&!lc.includes('tiktok')) return 'search';
    if((lc.includes('email')||lc.includes('push')||lc.includes('seller'))&&!lc.includes('meta')&&!lc.includes('tiktok')) return 'comms';

  }

  // ── Competitor header row ──

      <div class="mkt-cell-flow">${escHtml(ch.uxFlow)}</div>

  }

  // ── Render a campaign card for the grid ──
  function campCard(k, c, i){
    const active = isActive(k,'campaigns',i);
    return `<div class="mkt-cell-card mkt-row-clickable${active?' mkt-row-active':''}" onclick="showMktDetail('${k}','campaigns',${i})">
      <div class="mkt-cell-card-top"><span class="mkt-cell-card-name">${escHtml(c.name)}</span><span class="mkt-row-expand">›</span></div>
      <div class="mkt-cell-badges"><span class="mkt-channel-badge">${escHtml(c.channel)}</span><span class="mkt-date">${escHtml(c.period)}</span></div>

  // ── Build one surface row (returns HTML string) ──

      ${comps.map(k=>{
        const d=MD().mktFunnels[k];

    // 5 channel rows

        const d=MD().mktFunnels[k];

      }).join('')}

    gridContent = `<div class="mkt-row-grid-wrap"><div class="mkt-row-grid">
      ${compHeaderHtml()}${overviewRow}${chRows}${implRow}
    </div></div>`;

  } else if(section === 'creatives'){
    // Brand Voice row (evergreen pillars)
    const pillarsRow = `<div class="mkt-surface-row" style="border-top:none">
      <div class="mkt-surface-label" style="background:var(--navy);justify-content:center">

        <div class="mkt-surface-label-sub" style="color:rgba(255,255,255,.4)">Evergreen pillars</div>
      </div>
      ${comps.map(k=>{
        const d=MD().mktFunnels[k];
        const pillars=d.messaging.evergreen.map(p=>`<span class="pillar-tag" style="font-size:.63rem;padding:3px 8px" title="${escHtml(p.channels.join(', '))}: ${escHtml(p.copy)}">${escHtml(p.pillar)}</span>`).join('');

      }).join('')}

    // 5 campaign rows grouped by surface
    const campRows = rowDefs.map(row => surfaceRow(row, (k, rowKey) => {
      const d = MD().mktFunnels[k];

    gridContent = `<div class="mkt-row-grid-wrap"><div class="mkt-row-grid">

              <div class="mkt-ad-footer-right">

      detailHtml = `<div class="mkt-detail-panel" id="mktDetailPanel">

function renderSentiment(){
  const q = state.search;
  const comp = state.competitor;
  const items = (MD().sentimentItems||[]).filter(s =>
    matchesComp(s.competitor, comp) &&
    matchesSearch([s.competitor, ...s.complaints, ...s.praises], q)
  );

  const scoreColor = {good:'good',ok:'ok',bad:'bad'};

  const cards = items.length ? items.map(s => `
    <div class="sent-card">
      <div class="sent-header">
        <div class="sent-comp">${escHtml(s.competitor)}</div>
        <div class="sent-score ${scoreColor[s.scoreTier]||''}">${escHtml(s.score)}</div>
      </div>
      <div class="sent-body">
        <div class="sent-sources">${(s.sources||[]).map(src=>`<span class="src-chip">${escHtml(src)}</span>`).join('')}</div>
        <div style="height:8px"></div>
        <div class="sent-section-label">Top complaints</div>
        <div class="tag-list">${s.complaints.map(c=>`<span class="stag stag-red">${escHtml(c)}</span>`).join('')}</div>
        <div class="sent-section-label">Top praises</div>
        <div class="tag-list">${s.praises.map(p=>`<span class="stag stag-green">${escHtml(p)}</span>`).join('')}</div>
        <div class="sent-section-label">User voice</div>
        ${s.quotes.map(q=>`<div class="sent-quote">${escHtml(q)}</div>`).join('')}
      </div>
    </div>
  `).join('') : `<div class="empty-state">🔍<p>No sentiment data matches the current filter.</p></div>`;

  document.getElementById('panel-sentiment').innerHTML = `
    <div class="panel-header">
      <div class="panel-title">Competitor Sentiment</div>
      <div class="panel-sub">User reviews and feedback across App Store, Google Play, Reddit, and CONDUSEF</div>
    </div>
    <div class="sentiment-grid">${cards}</div>
  `;
}

window.toggleDetail = function(id){
  const detail = document.getElementById('detail-'+id);
  if(!detail) return;
  // Inject product specs on first open
  if(!detail.dataset.specsInjected){
    detail.dataset.specsInjected = 'true';
    const specs = document.getElementById('specs-'+id);
    if(specs){
      const items = (MD().productItems||{})[id];
      if(items && items.length > 0){
        const typeLabel = {bnpl:'BNPL',loan:'Cash Loan',card:'Credit Card',savings:'Savings',wallet:'Wallet'};
        specs.innerHTML = '<div class=”prod-specs-header”>Product Specs (Detailed Research)</div><div class=”prod-grid”>'+
          items.map(p =>
            '<div class=”prod-card”>'+
            '<span class=”prod-type-badge type-'+p.productType+'”>'+(typeLabel[p.productType]||p.productType)+'</span>'+
            '<div class=”prod-name”>'+escHtml(p.productName)+'</div>'+
            '<div class=”prod-specs”>'+

            '<div class=”spec-row”><span class=”spec-label”>Credit limit</span><span class=”spec-value”>'+escHtml(p.creditLimit)+'</span></div>'+
            '<div class=”spec-row”><span class=”spec-label”>Tenure</span><span class=”spec-value”>'+escHtml(p.tenure)+'</span></div>'+

            '<div class=”spec-row”><span class=”spec-label”>KYC</span><span class=”spec-value”>'+escHtml(p.kycRequirements)+'</span></div>'+
            '<div class=”spec-row”><span class=”spec-label”>Repayment</span><span class=”spec-value”>'+escHtml(p.repaymentOptions)+'</span></div>'+
            '<div class=”spec-row”><span class=”spec-label”>Fees</span><span class=”spec-value”>'+escHtml(p.fees)+'</span></div>'+

            '<div class=”spec-row”><span class=”spec-label”>Distribution</span><span class=”spec-value”>'+escHtml(p.distribution)+'</span></div>'+
            '</div>'+
            '<div class=”prod-promise”>”'+escHtml(p.promise)+'”</div>'+
            '<div class=”prod-notes”>'+escHtml(p.notes)+'</div>'+
            '</div>'
          ).join('')+
        '</div>';
      }
    }
  }
  // Populate modal header from card metadata
  const card = document.getElementById('card-'+id);
  const nameEl = card && card.querySelector('.card-name');
  const typeEl = card && card.querySelector('.card-type');
  document.getElementById('detail-modal-title').textContent = nameEl ? nameEl.textContent : id;
  document.getElementById('detail-modal-type').textContent = typeEl ? typeEl.textContent : '';
  // Populate modal body with detail content
  document.getElementById('detail-modal-body').innerHTML = detail.innerHTML;
  // Open modal
  document.getElementById('detail-modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
};

function closeDetailModal(){

// ═══════════════════════════════════════════
// TAB SWITCHING
// ═══════════════════════════════════════════
function switchTab(tab){
  state.tab = tab;
  document.body.className = (state.market ? 'market-selected ' : '') + 'tab-' + tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab===tab));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id==='panel-'+tab));
  renderActiveTab();
}

function renderActiveTab(){
  const t = state.tab;
  if(t==='digest'){
    renderDigest();
    if(state.market && window._changeLog) renderChangeLogBlock(state.market);
  }
  else if(t==='marketing') renderMarketing();
  else if(t==='products') renderProducts();
  else if(t==='sentiment') renderSentiment();
  else if(t==='macro') renderMacro();
}

// ═══════════════════════════════════════════
// FILTER CHIPS SETUP
// ═══════════════════════════════════════════
function setupChips(){
  const compList = (state.market && MD().competitors) ? MD().competitors : ['All'];
  const cc = document.getElementById('competitorChips');
  cc.innerHTML = compList.map(c => {
    const val = c.toLowerCase() === 'all' ? 'all' : c;
    const active = state.competitor === val || (val === 'all' && state.competitor === 'all');
    return `<button class="chip ${compClass(c)} ${active?'active':''}" data-comp="${val}">${c}</button>`;
  }).join('');
  cc.querySelectorAll('.chip').forEach(ch => {
    ch.addEventListener('click', () => {
      state.competitor = ch.dataset.comp;
      setupChips();
      renderActiveTab();
    });
  });
}

// ═══════════════════════════════════════════
// MARKET ROUTING
// ═══════════════════════════════════════════
function selectMarket(slug){
  state.market = slug;
  state.tab = 'digest';
  state.competitor = 'all';
  state.search = '';
  state.productsInit = false;
  state.chartsInit = {};
  state.mktDetail = null;
  const m = MARKET_DATA[slug].meta;
  document.querySelector('.brand-name').textContent = m.name + ' Credit Intelligence';
  const dotColor = (window._liveStatus === 'live') ? 'var(--green)' : (window._liveStatus === 'stale') ? 'var(--amber)' : 'var(--red)';
  const dotTitle = (window._liveStatus === 'live') ? 'Live — data from Supabase' : (window._liveStatus === 'stale') ? 'Stale — loading…' : 'Offline — embedded fallback';
  document.querySelector('.topbar-meta').innerHTML = `<span class="live-dot" style="background:${dotColor}" title="${dotTitle}"></span>Last updated: ` + m.lastUpdated;
  document.getElementById('searchInput').value = '';
  document.body.className = 'market-selected tab-digest';
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === 'digest'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'panel-digest'));
  setupChips();
  renderDigest();
  renderFreshnessBadges(window._sectionRefresh || []);
}

function goBackToLanding(){
  state.market = null;
  state.productsInit = false;
  state.chartsInit = {};
  state.mktDetail = null;
  document.body.className = '';
  clearFreshnessBadges();
}

function init(){
  // Tab buttons
  document.getElementById('tabNav').querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
  });

  // Search
  document.getElementById('searchInput').addEventListener('input', e => {
    state.search = e.target.value.trim();
    renderActiveTab();
  });

  // Start on landing screen (no market selected)
  document.body.className = '';

  // Modal dismiss: Escape key or click on backdrop
  document.addEventListener('keydown', e => { if(e.key === 'Escape') closeDetailModal(); });
  document.getElementById('detail-modal-overlay').addEventListener('click', e => {
    if(e.target === document.getElementById('detail-modal-overlay')) closeDetailModal();
  });
}

document.addEventListener('DOMContentLoaded', init);

// FRESHNESS BADGES
// ═══════════════════════════════════════════
function renderFreshnessBadges(refreshRows){
  if(!refreshRows || !refreshRows.length) return;
  const TAB_SECTION = { digest:'digest', products:'products', marketing:'marketing', sentiment:'sentiment', macro:'macro' };
  const market = state.market;
  const now = Date.now();
  refreshRows.filter(r => r.market_slug === market).forEach(r => {
    const el = document.getElementById('fb-' + r.section);
    if(!el) return;
    const cadenceMs = (r.cadence_hours || 24) * 3600 * 1000;
    const ageMs = r.last_refreshed_at ? now - new Date(r.last_refreshed_at).getTime() : Infinity;
    const pct = ageMs / cadenceMs;
    let cls, label;
    if(!r.last_refreshed_at){
      cls = 'unknown'; label = r.cadence;
    } else if(pct < 0.75){
      cls = 'fresh';
      const h = Math.round(ageMs / 3600000);
      label = h < 1 ? 'just now' : h < 24 ? h + 'h ago' : Math.round(h/24) + 'd ago';
    } else if(pct < 1){
      cls = 'stale';
      const h = Math.round(ageMs / 3600000);
      label = (h < 24 ? h + 'h' : Math.round(h/24) + 'd') + ' · due soon';
    } else {
      cls = 'overdue';
      const h = Math.round(ageMs / 3600000);
      label = (h < 24 ? h + 'h' : Math.round(h/24) + 'd') + ' overdue';
    }
    el.className = 'freshness-badge ' + cls;
    el.innerHTML = '<span class="freshness-dot"></span>' + label;
  });
}

function clearFreshnessBadges(){
  ['digest','products','marketing','sentiment','macro'].forEach(s => {
    const el = document.getElementById('fb-' + s);
    if(el){ el.className = 'freshness-badge unknown'; el.innerHTML = ''; }
  });
}

  function setLiveDot(status){

    window._liveStatus = status;
    const colors = { live: 'var(--green)', stale: 'var(--amber)', offline: 'var(--red)' };
    const titles = { live: 'Live — data from Supabase', stale: 'Stale — loading…', offline: 'Offline — embedded fallback' };

  // Tracks the snapshot created_at timestamp per market slug
  const _snapshotTs = {};

  function applyPayload(slug, payload, createdAt){
    if(!payload || typeof payload !== 'object') return false;
    // Merge Supabase payload into the existing market object.
    // Fields only in HTML (meta, competitors, mktComps, etc.) are preserved.
    // For array fields: skip overwrite if the incoming array is empty — keeps
    // the hand-curated HTML fallback data (e.g. upcomingEvents not yet fetched).
    const ARRAY_FIELDS = ['upcomingEvents', 'sentimentItems', 'businessStats'];
    const merged = Object.assign({}, payload);
    ARRAY_FIELDS.forEach(f => {
      if(Array.isArray(merged[f]) && merged[f].length === 0 &&
         Array.isArray(MARKET_DATA[slug]?.[f]) && MARKET_DATA[slug][f].length > 0) {
        delete merged[f];
      }
    });
    Object.assign(MARKET_DATA[slug], merged);
    if(createdAt) _snapshotTs[slug] = createdAt;
    return true;
  }

  function fmtSnapshotTs(slug){
    const raw = _snapshotTs[slug];
    if(!raw) return null;
    const d = new Date(raw);
    if(isNaN(d)) return null;
    return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})
      + ' ' + d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});

      const { data, error } = await supabase
        .from('intel_latest_snapshots')
        .select('market_slug,payload,created_at')
        .in('market_slug', MARKETS);

      if(error) throw error;
      if(!data || !data.length) throw new Error('No snapshots returned');

      let loaded = 0;
      data.forEach(row => {
        if(applyPayload(row.market_slug, row.payload, row.created_at)) loaded++;
      });

      if(loaded > 0){
        setLiveDot('live');
        if(state.market) refreshCurrentMarket(state.market);

    } catch(e) {
      console.warn('[Supabase] fetch failed, using embedded fallback:', e.message || e);
      setLiveDot('offline');

    // Always try to load freshness + changelog regardless of snapshot outcome
    await loadFreshnessAndChangelog();
  }

  function subscribeRealtime(){
    supabase
      .channel('dashboard-live')
      .on('postgres_changes', {
        event: 'INSERT',
        schema: 'public',
        table: 'intel_dashboard_snapshots'
      }, async (change) => {
        const slug = change.new && change.new.market_slug;
        if(!slug) return;
        // Fetch the full payload via the view (change.new.payload may be truncated by Realtime)
        const { data, error } = await supabase
          .from('intel_latest_snapshots')
          .select('payload,created_at')
          .eq('market_slug', slug)
          .single();

          applyPayload(slug, data.payload, data.created_at);
          setLiveDot('live');

        }
      })
      .subscribe(status => {
        if(status === 'SUBSCRIBED') console.log('[Supabase] Realtime connected');

      });
  }

})();
