name: Weekly Sentiment Fetcher

on:
  schedule:
    - cron: '0 4 * * 2'   # 4am UTC Tuesday (12pm SGT)
  workflow_dispatch:

jobs:
  fetch:
    name: Fetch app store sentiment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: competitor_intel-main/package.json

      - name: Install dependencies
        working-directory: competitor_intel-main
        run: npm install

      - name: Run sentiment fetcher
        working-directory: competitor_intel-main
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/fetchers/sentiment-feed.js
