<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCredito — Mexico Credit Intelligence</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --navy:#0f2342;--navy-mid:#1a3a6b;--navy-light:#2a5caa;
  --green:#00a878;--green-dark:#007a58;--green-light:#e0f7f1;
  --amber:#f59e0b;--amber-light:#fef3c7;
  --red:#e53e3e;--red-light:#fff5f5;
  --surface:#f5f7fc;--border:#dde5f4;--text:#1a2332;--muted:#5c6b84;
  --topbar-h:52px;--filterbar-h:44px;
}
body{font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--text);font-size:0.875rem}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:#b0c4de;border-radius:3px}

/* ── TOP BAR ── */
#topbar{
  position:fixed;top:0;left:0;right:0;height:var(--topbar-h);
  background:var(--navy);display:flex;align-items:center;
  gap:16px;padding:0 20px;z-index:300;
  box-shadow:0 2px 12px rgba(0,0,0,.25)
}
.brand{display:flex;align-items:baseline;gap:8px;flex-shrink:0}
.brand-eye{font-size:.6rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--green);border:1px solid var(--green);padding:2px 7px;border-radius:3px}
.brand-name{font-family:'DM Serif Display',serif;font-size:.95rem;color:#fff}
.tab-nav{display:flex;gap:2px;flex:1;justify-content:center}
.tab-btn{
  background:transparent;border:none;color:rgba(255,255,255,.55);
  font-family:'DM Sans',sans-serif;font-size:.75rem;font-weight:600;
  padding:8px 14px;border-radius:4px;cursor:pointer;
  letter-spacing:.3px;transition:all .2s;white-space:nowrap;
  border-bottom:2px solid transparent
}
.tab-btn:hover{color:#fff;background:rgba(255,255,255,.07)}
.tab-btn.active{color:#fff;border-bottom-color:var(--green);background:rgba(0,168,120,.12)}
.topbar-meta{font-size:.68rem;color:rgba(255,255,255,.45);white-space:nowrap;flex-shrink:0;display:flex;align-items:center;gap:5px}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── FILTER BAR ── */
#filterbar{
  position:fixed;top:var(--topbar-h);left:0;right:0;height:var(--filterbar-h);
  background:#fff;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:16px;padding:0 20px;z-index:200;
}
.filter-label{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);white-space:nowrap}
.chips{display:flex;gap:5px;flex-wrap:nowrap;overflow-x:auto}
.chip{
  font-size:.7rem;font-weight:600;padding:3px 10px;border-radius:12px;
  border:1px solid var(--border);background:var(--surface);color:var(--muted);
  cursor:pointer;white-space:nowrap;transition:all .15s
}
.chip:hover{border-color:var(--navy);color:var(--navy)}
.chip.active{background:var(--navy);border-color:var(--navy);color:#fff}
.chip.c-nu.active{background:#00a878;border-color:#00a878}
.chip.c-plata.active{background:var(--navy);border-color:var(--navy)}
.chip.c-kueski.active{background:#007a58;border-color:#007a58}
.chip.c-mp.active{background:var(--amber);border-color:var(--amber);color:#fff}
.chip.c-klar.active{background:var(--red);border-color:var(--red)}
.chip.c-stori.active{background:#92400e;border-color:#92400e}
.chip.c-didi.active{background:var(--red);border-color:var(--red)}
.filter-search{margin-left:auto;flex-shrink:0}
#searchInput{
  border:1px solid var(--border);border-radius:6px;padding:5px 10px;
  font-size:.78rem;font-family:'DM Sans',sans-serif;color:var(--text);
  background:var(--surface);width:180px;outline:none
}
#searchInput:focus{border-color:var(--navy);background:#fff}

/* ── PANELS ── */
.panel-container{margin-top:calc(var(--topbar-h) + var(--filterbar-h));min-height:calc(100vh - var(--topbar-h) - var(--filterbar-h))}
.tab-panel{display:none;padding:24px 28px 60px}
.tab-panel.active{display:block}

/* ── PANEL HEADER ── */
.panel-header{margin-bottom:20px}
.panel-title{font-family:'DM Serif Display',serif;font-size:1.5rem;color:var(--navy);margin-bottom:3px}
.panel-sub{font-size:.8rem;color:var(--muted)}

/* ── DIGEST CARDS ── */
.digest-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:28px}
.digest-card{
  background:#fff;border-radius:8px;border:1px solid var(--border);
  border-left:4px solid var(--border);padding:14px 18px;
  display:grid;grid-template-columns:1fr auto;gap:10px;
  transition:box-shadow .2s
}
.digest-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.07)}
.digest-card.urgency-high{border-left-color:var(--red)}
.digest-card.urgency-watch{border-left-color:var(--amber)}
.digest-card.urgency-info{border-left-color:var(--green)}
.dc-left{min-width:0}
.dc-meta{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.urgency-badge{font-size:.6rem;font-weight:800;letter-spacing:.8px;text-transform:uppercase;padding:2px 7px;border-radius:3px}
.urgency-badge.high{background:var(--red-light);color:var(--red)}
.urgency-badge.watch{background:var(--amber-light);color:#92400e}
.urgency-badge.info{background:var(--green-light);color:var(--green-dark)}
.comp-badge{font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:10px;background:var(--surface);color:var(--navy);border:1px solid var(--border)}
.dc-date{font-size:.67rem;color:var(--muted)}
.dc-title{font-size:.92rem;font-weight:700;color:var(--navy);margin-bottom:6px}
.dc-title a{color:inherit;text-decoration:none}
.dc-title a:hover{color:var(--green-dark);text-decoration:underline}
.dc-why{font-size:.8rem;color:#4a5568;line-height:1.55;margin-bottom:6px}
.dc-why strong{color:var(--navy)}
.dc-action{
  font-size:.78rem;font-weight:600;color:var(--green-dark);
  background:var(--green-light);border-radius:4px;padding:5px 10px;
  border-left:3px solid var(--green)
}
.dc-action::before{content:"→ SCredito: "}

/* ── UPCOMING TABLE ── */
.upcoming-section{background:#fff;border-radius:8px;border:1px solid var(--border);padding:16px 18px;margin-bottom:24px}
.section-eyebrow{font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:10px}
.upcoming-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px}
.upcoming-item{background:var(--surface);border-radius:6px;padding:8px 12px;border-left:3px solid var(--border)}
.upcoming-item.soon{border-left-color:var(--amber)}
.upcoming-item.critical{border-left-color:var(--red)}
.up-date{font-size:.67rem;font-weight:700;color:var(--green-dark);margin-bottom:2px}
.up-title{font-size:.78rem;font-weight:600;color:var(--navy)}
.up-note{font-size:.7rem;color:var(--muted);margin-top:2px}

/* ── MARKETING CARDS ── */
.marketing-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px;margin-bottom:28px}
.mkt-card{background:#fff;border-radius:8px;border:1px solid var(--border);border-top:3px solid var(--navy);overflow:hidden}
.mkt-header{padding:12px 14px 8px;display:flex;justify-content:space-between;align-items:flex-start}
.mkt-comp{font-size:.65rem;font-weight:800;text-transform:uppercase;letter-spacing:1px}
.mkt-date{font-size:.65rem;color:var(--muted)}
.mkt-screenshot{height:80px;background:var(--surface);border-top:1px solid var(--border);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:center;gap:8px;color:var(--muted);font-size:.75rem}
.mkt-body{padding:10px 14px}
.mkt-channel-badge{display:inline-block;font-size:.62rem;font-weight:700;padding:2px 7px;border-radius:3px;background:var(--surface);border:1px solid var(--border);color:var(--navy);margin-bottom:6px}
.mkt-hook{font-size:.85rem;font-weight:700;color:var(--navy);margin-bottom:4px}
.mkt-mechanics{font-size:.75rem;color:#4a5568;line-height:1.5;margin-bottom:8px}
.mkt-row{display:flex;justify-content:space-between;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.mkt-field{font-size:.7rem;color:var(--muted)}
.mkt-field strong{display:block;font-size:.75rem;color:var(--text);font-weight:600}
.aggr-badge{font-size:.65rem;font-weight:800;padding:2px 8px;border-radius:3px;text-transform:uppercase;letter-spacing:.5px}
.aggr-badge.high{background:var(--red-light);color:var(--red)}
.aggr-badge.medium{background:var(--amber-light);color:#92400e}
.aggr-badge.low{background:var(--green-light);color:var(--green-dark)}
.mkt-counter{background:var(--navy);color:#fff;font-size:.75rem;font-weight:600;padding:8px 12px;margin:0 -14px -10px;border-top:1px solid rgba(255,255,255,.1)}
.mkt-counter::before{content:"↩ Counter: ";opacity:.6}

/* ── PRODUCT FEED ── */
.prod-subnav{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.prod-tab-btn{font-size:.72rem;font-weight:700;padding:5px 12px;border-radius:4px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;transition:all .15s}
.prod-tab-btn:hover{border-color:var(--navy);color:var(--navy)}
.prod-tab-btn.active{background:var(--navy);border-color:var(--navy);color:#fff}
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:24px}
.prod-card{background:#fff;border-radius:8px;border:1px solid var(--border);border-top:4px solid var(--navy);padding:16px}
.prod-type-badge{font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;padding:2px 8px;border-radius:3px;display:inline-block;margin-bottom:8px}
.type-bnpl{background:var(--green-light);color:var(--green-dark)}
.type-loan{background:var(--amber-light);color:#92400e}
.type-card{background:#e8eeff;color:var(--navy-mid)}
.type-savings{background:var(--surface);color:var(--muted)}
.type-wallet{background:#f3e8ff;color:#6b21a8}
.prod-name{font-size:1rem;font-weight:700;color:var(--navy);margin-bottom:10px}
.prod-specs{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
.spec-row{display:flex;justify-content:space-between;font-size:.75rem;border-bottom:1px solid var(--surface);padding-bottom:4px}
.spec-label{color:var(--muted);font-weight:500}
.spec-value{color:var(--text);font-weight:600;text-align:right;max-width:55%}
.prod-promise{font-size:.75rem;font-style:italic;color:var(--navy-mid);margin-bottom:8px;padding:6px 8px;background:var(--surface);border-radius:4px}
.prod-weakness{font-size:.73rem;color:#92400e;background:var(--amber-light);padding:6px 10px;border-radius:4px;border-left:3px solid var(--amber)}
.prod-weakness::before{content:"⚡ Exploit: "}
.threat-section{background:#fff;border:1px solid var(--border);border-top:4px solid var(--red);border-radius:8px;padding:20px;margin-bottom:24px}
.threat-title{font-family:'DM Serif Display',serif;font-size:1.1rem;color:var(--red);margin-bottom:8px}
.threat-bullets{list-style:none;display:flex;flex-direction:column;gap:6px}
.threat-bullets li{font-size:.8rem;color:#4a5568;padding-left:16px;position:relative;line-height:1.5}
.threat-bullets li::before{content:"→";position:absolute;left:0;color:var(--red);font-weight:700}

/* ── SENTIMENT ── */
.sentiment-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px;margin-bottom:28px}
.sent-card{background:#fff;border-radius:8px;border:1px solid var(--border);overflow:hidden}
.sent-header{padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.sent-comp{font-size:.75rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--navy)}
.sent-score{font-family:'DM Serif Display',serif;font-size:1.3rem}
.sent-score.good{color:var(--green-dark)}
.sent-score.ok{color:#92400e}
.sent-score.bad{color:var(--red)}
.sent-body{padding:14px 16px}
.sent-section-label{font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px}
.tag-list{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.stag{font-size:.67rem;font-weight:600;padding:2px 8px;border-radius:10px}
.stag-red{background:var(--red-light);color:var(--red);border:1px solid #fc8181}
.stag-green{background:var(--green-light);color:var(--green-dark);border:1px solid #b2ddd3}
.sent-quote{background:var(--surface);border-left:3px solid var(--border);border-radius:0 4px 4px 0;padding:7px 10px;font-size:.74rem;font-style:italic;color:#4a5568;margin-bottom:6px;line-height:1.5}
.sent-opp{background:var(--navy);color:#fff;font-size:.74rem;font-weight:600;padding:8px 12px;border-radius:0 0 6px 6px;margin:10px -16px -14px;line-height:1.5}
.sent-opp::before{content:"↗ SCredito: ";color:var(--green);font-weight:800}
.sent-sources{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.src-chip{font-size:.62rem;padding:1px 7px;border-radius:8px;background:var(--surface);border:1px solid var(--border);color:var(--muted)}

/* ── BUSINESS STATS ── */
.threat-summary-table{margin-bottom:24px;overflow-x:auto}
.threat-table{width:100%;border-collapse:collapse;font-size:.78rem;background:#fff;border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.threat-table thead tr{background:var(--navy);color:#fff}
.threat-table th{padding:9px 12px;text-align:left;font-size:.7rem;font-weight:600;white-space:nowrap}
.threat-table tbody tr{transition:background .1s}
.threat-table tbody tr:nth-child(even){background:var(--surface)}
.threat-table tbody tr:hover{background:#e8f4f0}
.threat-table td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
.threat-row-high td:first-child{border-left:3px solid var(--red)}
.threat-row-medium td:first-child{border-left:3px solid var(--amber)}
.threat-row-low td:first-child{border-left:3px solid var(--green)}
.t-badge{display:inline-block;font-size:.63rem;font-weight:800;padding:2px 7px;border-radius:3px;text-transform:uppercase;letter-spacing:.4px}
.t-high{background:var(--red-light);color:var(--red)}
.t-medium{background:var(--amber-light);color:#92400e}
.t-low{background:var(--green-light);color:var(--green-dark)}
.t-strong{background:var(--green-light);color:var(--green-dark)}
.t-mixed{background:var(--amber-light);color:#92400e}
.t-weak{background:var(--red-light);color:var(--red)}
.t-unknown{background:var(--surface);color:var(--muted)}
.est{font-size:.65rem;color:var(--muted);font-style:italic}

.biz-accordion{display:flex;flex-direction:column;gap:8px;margin-bottom:28px}
.biz-row{background:#fff;border-radius:8px;border:1px solid var(--border);overflow:hidden}
.biz-header{
  padding:12px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;
  transition:background .15s
}
.biz-header:hover{background:var(--surface)}
.biz-comp-name{font-weight:700;color:var(--navy);font-size:.88rem;min-width:120px}
.biz-pills{display:flex;gap:6px;flex-wrap:wrap;flex:1}
.biz-pill{font-size:.68rem;background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:2px 8px;color:var(--text)}
.biz-pill span{color:var(--muted);font-size:.62rem;display:block}
.biz-badges{display:flex;gap:5px;margin-left:auto}
.biz-detail{display:none;border-top:1px solid var(--border);padding:16px}
.biz-detail.open{display:block}
.biz-ue-table{width:100%;border-collapse:collapse;font-size:.77rem;margin-bottom:10px}
.biz-ue-table th{text-align:left;padding:6px 10px;background:var(--surface);font-size:.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.biz-ue-table td{padding:7px 10px;border-bottom:1px solid var(--surface)}
.biz-implication{font-size:.78rem;font-weight:600;color:var(--green-dark);background:var(--green-light);padding:8px 12px;border-radius:4px;border-left:3px solid var(--green)}
.biz-implication::before{content:"SCredito: "}

/* ── MACRO ── */
.macro-kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:24px}
.macro-kpi{background:#fff;border-radius:8px;border:1px solid var(--border);border-top:3px solid var(--navy);padding:14px 16px}
.macro-kpi.green{border-top-color:var(--green)}
.macro-kpi.amber{border-top-color:var(--amber)}
.macro-kpi.red{border-top-color:var(--red)}
.mkpi-val{font-family:'DM Serif Display',serif;font-size:1.6rem;color:var(--navy);line-height:1}
.macro-kpi.green .mkpi-val{color:var(--green-dark)}
.macro-kpi.amber .mkpi-val{color:#92400e}
.macro-kpi.red .mkpi-val{color:var(--red)}
.mkpi-label{font-size:.67rem;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-top:4px}
.mkpi-note{font-size:.7rem;color:#4a5568;margin-top:5px;line-height:1.4}
.macro-charts{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.chart-box{background:#fff;border-radius:8px;border:1px solid var(--border);padding:16px}
.chart-box canvas{max-height:220px}
.chart-title{font-size:.75rem;font-weight:700;color:var(--navy);margin-bottom:10px}
.cal-table{width:100%;border-collapse:collapse;font-size:.78rem;background:#fff;border-radius:8px;overflow:hidden;border:1px solid var(--border);margin-bottom:16px}
.cal-table thead tr{background:var(--navy);color:#fff}
.cal-table th{padding:8px 12px;font-size:.7rem;font-weight:600;text-align:left}
.cal-table td{padding:8px 12px;border-bottom:1px solid var(--border)}
.cal-table tbody tr:hover{background:var(--surface)}

/* ── IMPLICATION BOX ── */
.implication-box{
  background:var(--amber-light);border:1px solid var(--amber);
  border-radius:8px;padding:16px 20px;margin-bottom:8px
}
.imp-title{font-size:.65rem;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:#92400e;margin-bottom:6px}
.imp-body{font-size:.83rem;font-weight:600;color:var(--navy);line-height:1.6}

/* ── VERDICT BOX ── */
.verdict-box{border-radius:8px;padding:16px 20px;margin-bottom:8px;border:1px solid}
.verdict-box.favorable{background:var(--green-light);border-color:var(--green)}
.verdict-box.neutral{background:var(--amber-light);border-color:var(--amber)}
.verdict-box.risky{background:var(--red-light);border-color:var(--red)}
.verdict-label{font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px}
.verdict-box.favorable .verdict-label{color:var(--green-dark)}
.verdict-box.neutral .verdict-label{color:#92400e}
.verdict-box.risky .verdict-label{color:var(--red)}
.verdict-text{font-size:.85rem;font-weight:600;color:var(--navy);line-height:1.55}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:48px 20px;color:var(--muted)}
.empty-state p{font-size:.85rem;margin-top:6px}

/* ── SECTION DIVIDER ── */
.section-hed{font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin:24px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border)}

/* ── SOURCE LINK ── */
a.src{font-size:.65rem;color:var(--navy-light);text-decoration:none}
a.src:hover{text-decoration:underline}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div class="brand">
    <div class="brand-eye">SCredito</div>
    <div class="brand-name">Mexico Credit Intelligence</div>
  </div>
  <nav class="tab-nav" id="tabNav">
    <button class="tab-btn active" data-tab="digest">Daily Digest</button>
    <button class="tab-btn" data-tab="marketing">Marketing Feed</button>
    <button class="tab-btn" data-tab="products">Product Feed</button>
    <button class="tab-btn" data-tab="sentiment">Sentiment</button>
    <button class="tab-btn" data-tab="business">Business &amp; UE</button>
    <button class="tab-btn" data-tab="macro">Macro</button>
  </nav>
  <div class="topbar-meta">
    <span class="live-dot"></span>
    Last updated: May 21, 2026
  </div>
</div>

<!-- FILTER BAR -->
<div id="filterbar">
  <span class="filter-label">Competitor</span>
  <div class="chips" id="competitorChips"></div>
  <span class="filter-label channel-filter-label" id="channelFilterLabel" style="display:none">Channel</span>
  <div class="chips channel-filter" id="channelChips" style="display:none"></div>

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
function escHtml(str){return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function compClass(c){return 'c-'+(c||'').toLowerCase().replace(/\s+/g,'')}
function fmtDate(d){return d||''}

function threatBadge(level){
  const cls={high:'t-high',medium:'t-medium',low:'t-low',strong:'t-strong',mixed:'t-mixed',weak:'t-weak',unknown:'t-unknown'};
  return `<span class="t-badge ${cls[level]||'t-unknown'}">${level||'—'}</span>`;
}

function implicationBox(text){
  return `<div class="implication-box"><div class="imp-title">Implication for SCredito</div><div class="imp-body">${text}</div></div>`;
}

function matchesSearch(fields, q){
  if(!q) return true;
  const lq = q.toLowerCase();
  return fields.some(f => f && String(f).toLowerCase().includes(lq));
}

function matchesComp(itemComp, filterComp){
  if(filterComp === 'all') return true;
  return (itemComp||'').toLowerCase() === filterComp.toLowerCase();
}

      <td style="font-size:.72rem;color:var(--muted);max-width:220px">${escHtml(b.threatWhy)}</td>
    </tr>
  `).join('');

  const accordions = items.map(b => `
    <div class="biz-row">
      <div class="biz-header" onclick="toggleBiz('${b.id}')">
        <div class="biz-comp-name">${escHtml(b.competitor)}</div>
        <div class="biz-pills">
          <div class="biz-pill">${escHtml(b.users)}<span>Users</span></div>
          <div class="biz-pill">${escHtml(b.loanOS)}<span>Loan OS</span></div>
          <div class="biz-pill">${escHtml(b.revenue)}<span>Revenue</span></div>
          <div class="biz-pill">${escHtml(b.npl)}<span>NPL</span></div>
        </div>
        <div class="biz-badges">
          ${threatBadge(b.ueQuality)} ${threatBadge(b.threatLevel)}
          <span style="font-size:.7rem;color:var(--muted);padding:2px 6px">${b.ueConfidence} confidence</span>
        </div>
      </div>
      <div class="biz-detail" id="biz-${b.id}">
        <table class="biz-ue-table">
          <tr><th>Metric</th><th>Value</th><th>Notes</th></tr>
          <tr><td>Funding raised</td><td>${escHtml(b.funding)}</td><td>${escHtml(b.fundingAdvantage)}</td></tr>
          <tr><td>Est. CAC</td><td>${escHtml(b.estCAC)}</td><td>${escHtml(b.estPromoBurn)}</td></tr>
          <tr><td>NPL / Delinquency</td><td>${escHtml(b.npl)}</td><td>—</td></tr>
          <tr><td>Monetisation model</td><td colspan="2">${escHtml(b.monetisation)}</td></tr>
          <tr><td>Distribution</td><td colspan="2">${escHtml(b.distribution)}</td></tr>
        </table>
        <div class="biz-implication">${escHtml(b.implication)}</div>
      </div>
    </div>
  `).join('');

  document.getElementById('panel-business').innerHTML = `
    <div class="panel-header">
      <div class="panel-title">Business Stats &amp; Unit Economics</div>
      <div class="panel-sub">Separating real threats from subsidised noise — who is actually dangerous, and who is buying bad growth</div>
    </div>
    <div class="section-hed">Threat summary — all competitors</div>
    <div class="threat-summary-table">
      <table class="threat-table">
        <thead><tr>
          <th>Competitor</th><th>Users</th><th>NPL</th><th>Est. CAC</th>
          <th>UE Quality</th><th>Threat</th><th>Why</th>
        </tr></thead>
        <tbody>${tableRows}</tbody>
      </table>
    </div>
    <div class="section-hed">Detail by competitor (click to expand)</div>
    <div class="biz-accordion">${accordions}</div>
    ${implicationBox('Actual threats ranked: (1) Mercado Pago — platform data moat, near-zero CAC, profitable. (2) Plata — $2B+ capital, fastest growth, banking licence. (3) Nu — 14M users, $808M revenue, but structurally losing money. The rest are noise or opportunities. Klar is distressed. Stori is single-product and high-NPL. DiDi is a watch item pending regulatory outcome.')}
  `;
}

function toggleBiz(id){
  const el = document.getElementById('biz-'+id);
  if(el) el.classList.toggle('open');
}

// ═══════════════════════════════════════════
// RENDER: MACRO
// ═══════════════════════════════════════════
function renderMacro(){
  const d = DATA.macroData;
  const colorMap = {navy:'navy',amber:'amber',red:'red',green:'green'};

  const kpis = d.indicators.map(k => `
    <div class="macro-kpi ${colorMap[k.color]||''}">
      <div class="mkpi-val">${escHtml(k.value)}</div>
      <div class="mkpi-label">${escHtml(k.label)}</div>
      <div class="mkpi-note">${escHtml(k.note)}</div>
    </div>
  `).join('');

  const regRows = d.regulatory.map(r => `
    <tr>
      <td>${escHtml(r.date)}</td>
      <td><strong>${escHtml(r.event)}</strong></td>
      <td>${threatBadge(r.impact.toLowerCase())}</td>
      <td style="font-size:.75rem;color:var(--muted)">${escHtml(r.note)}</td>
    </tr>
  `).join('');

  const calRows = d.seasonal.map(r => `
    <tr>
      <td>${escHtml(r.period)}</td>
      <td><strong>${escHtml(r.event)}</strong></td>
      <td style="font-size:.75rem;color:var(--muted)">${escHtml(r.note)}</td>
    </tr>
  `).join('');

  document.getElementById('panel-macro').innerHTML = `
    <div class="panel-header">
      <div class="panel-title">Macro &amp; Market Stats</div>
      <div class="panel-sub">Whether Mexico lending conditions are getting easier or harder — and what drives the shift</div>
    </div>
    <div class="macro-kpi-grid">${kpis}</div>
    <div class="macro-charts">
      <div class="chart-box">
        <div class="chart-title">Banxico rate vs fintech deposit rate (2022–2026)</div>
        <canvas id="macroRatesChart"></canvas>
      </div>
      <div class="chart-box">
        <div class="chart-title">NPL trend by competitor (IMOR %, 2023–2025)</div>
        <canvas id="macroNplChart"></canvas>
      </div>
    </div>
    <div class="section-hed">Regulatory calendar</div>
    <table class="cal-table">
      <thead><tr><th>Date</th><th>Event</th><th>Impact</th><th>Note</th></tr></thead>
      <tbody>${regRows}</tbody>
    </table>
    <div class="section-hed">Seasonal calendar</div>
    <table class="cal-table">
      <thead><tr><th>Period</th><th>Event</th><th>SCredito action</th></tr></thead>
      <tbody>${calRows}</tbody>
    </table>
    <div class="verdict-box neutral">
      <div class="verdict-label">Market condition for SCredito growth</div>
      <div class="verdict-text">NEUTRAL — leaning favorable. Easing rate cycle (6.50% and falling) reduces cost of debt funding over 2026. BNPL growing 29% CAGR. 70% of adults still without a credit card. But: personal loan NPL +47% in 2025 signals credit stress in the underbanked segment. Disciplined underwriting is now the defining variable.</div>
    </div>
    ${implicationBox('Enter 2026 with: (1) Debt funding locked in at current rates before further cuts compress market pricing. (2) NPL guardrails set at product level before scaling — Klar shows what happens when you don\'t. (3) Hot Sale Jun 1–6 is the first major merchant activation window — have checkout BNPL ready or cede ground to Kueski.')}
  `;

  if(!state.chartsInit.macro){
    state.chartsInit.macro = true;
    const rd = d.ratesData;
    new Chart(document.getElementById('macroRatesChart'),{
      type:'line',
      data:{
        labels:rd.labels,
        datasets:[
          {label:'Banxico rate',data:rd.banxico,borderColor:'#0f2342',backgroundColor:'rgba(15,35,66,.08)',tension:.3,pointRadius:3},
          {label:'Fintech deposit rate',data:rd.fintech,borderColor:'#00a878',backgroundColor:'rgba(0,168,120,.08)',tension:.3,pointRadius:3,borderDash:[4,3]},
        ]
      },
      options:{responsive:true,plugins:{legend:{position:'bottom',labels:{boxWidth:10,font:{size:9}}}},scales:{y:{ticks:{callback:v=>v+'%'},grid:{color:'#eef2f6'}},x:{ticks:{font:{size:9}}}}}
    });
    const nd = d.nplData;
    new Chart(document.getElementById('macroNplChart'),{
      type:'line',
      data:{
        labels:nd.labels,
        datasets:[
          {label:'Nu Mexico',data:nd.nu,borderColor:'#00a878',tension:.3,pointRadius:3,fill:false},
          {label:'Klar',data:nd.klar,borderColor:'#e53e3e',tension:.3,pointRadius:3,fill:false},
          {label:'Stori',data:nd.stori,borderColor:'#f59e0b',tension:.3,pointRadius:3,fill:false},
        ]
      },
      options:{responsive:true,plugins:{legend:{position:'bottom',labels:{boxWidth:10,font:{size:9}}}},scales:{y:{ticks:{callback:v=>v+'%'},grid:{color:'#eef2f6'}},x:{ticks:{font:{size:9}}}}}
    });
  }
}

// ═══════════════════════════════════════════
// TAB SWITCHING
// ═══════════════════════════════════════════
function switchTab(tab){
  state.tab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab===tab));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id==='panel-'+tab));
  // show channel filter only on marketing tab
  const showChan = tab === 'marketing';
  document.getElementById('channelFilterLabel').style.display = showChan ? '' : 'none';
  document.getElementById('channelChips').style.display = showChan ? '' : 'none';
  renderActiveTab();
}

function renderActiveTab(){
  const t = state.tab;
  if(t==='digest') renderDigest();
  else if(t==='marketing') renderMarketing();
  else if(t==='products') renderProducts();
  else if(t==='sentiment') renderSentiment();
  else if(t==='business') renderBusiness();
  else if(t==='macro') renderMacro();
}

// ═══════════════════════════════════════════
// FILTER CHIPS SETUP
// ═══════════════════════════════════════════
function setupChips(){
  const compList = ['All','Nu','Plata','Kueski','Mercado Pago','Klar','Stori','DiDi','Regulatory','Macro'];
  const cc = document.getElementById('competitorChips');
  cc.innerHTML = compList.map(c => {
    const val = c.toLowerCase() === 'all' ? 'all' : c;
    const active = state.competitor === val || (val === 'all' && state.competitor === 'all');
    return `<button class="chip ${compClass(c)} ${active?'active':''}" data-comp="${val}">${c}</button>`;
  }).join('');
  cc.querySelectorAll('.chip').forEach(ch => {
    ch.addEventListener('click', () => {
      state.competitor = ch.dataset.comp;
      setupChips(); // re-render chips
      renderActiveTab();
    });
  });

  const chanList = ['All','Social/Meta','TikTok','Google / SEO','App / In-app','Marketplace','Influencer'];
  const chc = document.getElementById('channelChips');
  chc.innerHTML = chanList.map(c => {
    const val = c.toLowerCase() === 'all' ? 'all' : c;
    const active = state.channel === val || (val === 'all' && state.channel === 'all');
    return `<button class="chip ${active?'active':''}" data-chan="${val}">${c}</button>`;
  }).join('');
  chc.querySelectorAll('.chip').forEach(ch => {
    ch.addEventListener('click', () => {
      state.channel = ch.dataset.chan;
      setupChips();
      renderActiveTab();
    });
  });
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
function init(){
  // Tab buttons
  document.getElementById('tabNav').querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
  });

  // Search
  document.getElementById('searchInput').addEventListener('input', e => {
    state.search = e.target.value.trim();
    renderActiveTab();
  });

  setupChips();
  renderDigest();
}

document.addEventListener('DOMContentLoaded', init);
</script>
